<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MercadoShop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

/* HEADER */

header{
background:linear-gradient(135deg,#0d6efd,#084298);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.carrito-btn{
background:white;
color:#0d6efd;
padding:6px 12px;
border-radius:20px;
font-weight:bold;
cursor:pointer;
}

/* BUSCADOR */

.buscador{
padding:10px;
background:white;
}

.buscador input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

/* CARRUSEL */

.carrusel{
margin:10px;
border-radius:15px;
overflow:hidden;
position:relative;
}

.carrusel img{
width:100%;
height:200px;
object-fit:cover;
display:none;
}

.carrusel img.activo{
display:block;
}

.carrusel-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,.4);
color:white;
border:none;
font-size:22px;
padding:5px 10px;
cursor:pointer;
}

.prev{left:10px;}
.next{right:10px;}

/* PRODUCTOS */

.productos{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:15px;
padding:15px;
}

.producto{
background:white;
border-radius:12px;
padding:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
cursor:pointer;
transition:.3s;
}

.producto:hover{
transform:translateY(-5px);
}

.producto img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

.precio{
color:#0d6efd;
font-weight:bold;
}

/* MODAL */

#modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
}

.btn{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin-top:10px;
font-size:15px;
cursor:pointer;
}

.btn-carrito{
background:#0d6efd;
color:white;
}

.btn-whatsapp{
background:#25D366;
color:white;
}

/* CARRITO */

#carrito{
position:fixed;
bottom:-100%;
left:0;
width:100%;
height:80%;
background:white;
border-radius:20px 20px 0 0;
padding:20px;
transition:.4s;
overflow:auto;
}

#carrito.activo{
bottom:0;
}

.carrito-item{
border-bottom:1px solid #ddd;
padding:10px 0;
}

.eliminar{
color:red;
cursor:pointer;
font-size:13px;
}

</style>
</head>

<body>

<header>
<h2>🛒 MercadoShop</h2>
<div class="carrito-btn" onclick="toggleCarrito()">
🛍 (<span id="contador">0</span>)
</div>
</header>

<div class="buscador">
<input type="search" placeholder="Buscar productos..." id="buscar" onkeyup="buscarProducto()">
</div>

<!-- CARRUSEL DE OFERTAS -->

<div class="carrusel">

<img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da" class="slide activo">

<img src="https://images.unsplash.com/photo-1607083206968-13611e3d76db" class="slide">

<img src="https://images.unsplash.com/photo-1607083206173-7c5c7d6c2b1e" class="slide">

<button class="carrusel-btn prev" onclick="cambiarSlide(-1)">❮</button>

<button class="carrusel-btn next" onclick="cambiarSlide(1)">❯</button>

</div>

<!-- PRODUCTOS -->

<div class="productos" id="productos"></div>

<!-- MODAL -->

<div id="modal">
<div class="modal-content">

<h3 id="modalNombre"></h3>

<img id="modalImg" style="width:100%;height:200px;object-fit:cover;border-radius:10px">

<p id="modalDesc"></p>

<p class="precio" id="modalPrecio"></p>

<p id="modalEntrega"></p>

<button class="btn btn-carrito" onclick="agregarCarrito()">Agregar al carrito</button>

<button class="btn btn-whatsapp" onclick="pedirWhatsApp()">Pedir por WhatsApp</button>

<button class="btn" onclick="cerrarModal()">Cerrar</button>

</div>
</div>

<!-- CARRITO -->

<div id="carrito">

<h3>Tu carrito</h3>

<div id="lista"></div>

<p><strong>Total: $<span id="total">0</span></strong></p>

<button class="btn btn-whatsapp" onclick="enviarWhatsApp()">Pedir todo por WhatsApp</button>

</div>

<script>

const productos=[

{
nombre:"Taladro DEWALT",
precio:2500,
descripcion:"Taladro profesional",
imagen:"https://cdn-icons-png.flaticon.com/512/891/891462.png",
dias:30
},

{
nombre:"Tenis deportivos",
precio:750,
descripcion:"Ideales para correr",
imagen:"https://cdn-icons-png.flaticon.com/512/2589/2589903.png",
dias:15
},

{
nombre:"Smartwatch",
precio:850,
descripcion:"Reloj inteligente",
imagen:"https://cdn-icons-png.flaticon.com/512/747/747376.png",
dias:7
}

];

let carrito=[];
let total=0;
let productoActual={};

function cargarProductos(){

let cont=document.getElementById("productos");

productos.forEach(p=>{

let card=document.createElement("div");
card.className="producto";

card.innerHTML=`

<img src="${p.imagen}">
<h3>${p.nombre}</h3>
<p class="precio">$${p.precio}</p>

`;

card.onclick=()=>verProducto(p);

cont.appendChild(card);

});

}

cargarProductos();

function verProducto(p){

modal.style.display="flex";

modalNombre.innerText=p.nombre;
modalDesc.innerText=p.descripcion;
modalPrecio.innerText="$"+p.precio;
modalEntrega.innerText="Entrega: "+p.dias+" días";
modalImg.src=p.imagen;

productoActual=p;

}

function cerrarModal(){
modal.style.display="none";
}

function agregarCarrito(){

carrito.push(productoActual);

total+=productoActual.precio;

actualizarCarrito();

cerrarModal();

}

function actualizarCarrito(){

lista.innerHTML="";

carrito.forEach((p,i)=>{

lista.innerHTML+=`

<div class="carrito-item">
${p.nombre} - $${p.precio}
<div class="eliminar" onclick="eliminar(${i})">Eliminar</div>
</div>

`;

});

contador.innerText=carrito.length;

totalSpan.innerText=total;

}

function eliminar(i){

total-=carrito[i].precio;

carrito.splice(i,1);

actualizarCarrito();

}

function toggleCarrito(){

carritoDiv.classList.toggle("activo");

}

function buscarProducto(){

let texto=buscar.value.toLowerCase();

document.querySelectorAll(".producto").forEach(p=>{

let nombre=p.querySelector("h3").innerText.toLowerCase();

p.style.display=nombre.includes(texto)?"block":"none";

});

}

function enviarWhatsApp(){

let texto="Hola quiero pedir:%0A";

carrito.forEach(p=>{

texto+=`- ${p.nombre} $${p.precio}%0A`;

});

window.open("https://wa.me/522727224580?text="+texto);

}

function pedirWhatsApp(){

let texto="Hola quiero pedir: "+productoActual.nombre;

window.open("https://wa.me/522727224580?"+texto);

}

/* CARRUSEL */

let slides=document.querySelectorAll(".slide");
let indexSlide=0;

function cambiarSlide(n){

slides[indexSlide].classList.remove("activo");

indexSlide=(indexSlide+n+slides.length)%slides.length;

slides[indexSlide].classList.add("activo");

}

setInterval(()=>{

cambiarSlide(1);

},4000);

const carritoDiv=document.getElementById("carrito");
const lista=document.getElementById("lista");
const contador=document.getElementById("contador");
const totalSpan=document.getElementById("total");

</script>

</body>
</html>
