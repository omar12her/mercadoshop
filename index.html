<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MercadoShop</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* HEADER */

header{
background:linear-gradient(135deg,#0d6efd,#084298);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.carrito-btn{
background:white;
color:#0d6efd;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
}

/* BUSCADOR */

.buscador{
padding:10px;
background:white;
}

.buscador input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

/* CARRUSEL */

.carrusel{
margin:10px;
border-radius:12px;
overflow:hidden;
}

.carrusel img{
width:100%;
height:180px;
object-fit:cover;
display:none;
}

.carrusel img.activo{
display:block;
}

/* CATEGORIAS */

.categorias{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
}

.categorias button{
border:none;
background:white;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
}

/* PRODUCTOS */

.productos{
display:flex;
gap:12px;
overflow-x:auto;
padding:10px;
}

.producto{
min-width:160px;
background:white;
border-radius:12px;
padding:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
cursor:pointer;
}

.producto img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
}

.precio{
color:#0d6efd;
font-weight:bold;
}

/* MODAL */

#modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:15px;
border-radius:12px;
width:90%;
max-width:400px;
}

/* GALERIA */

.galeria{
display:flex;
overflow-x:auto;
gap:10px;
}

.galeria img{
min-width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

/* BOTONES */

.btn{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin-top:6px;
cursor:pointer;
}

.btn-carrito{
background:#0d6efd;
color:white;
}

.btn-whatsapp{
background:#25D366;
color:white;
}

/* CARRITO */

#carrito{
position:fixed;
bottom:-100%;
left:0;
width:100%;
height:80%;
background:white;
border-radius:20px 20px 0 0;
padding:15px;
transition:.4s;
overflow:auto;
}

#carrito.activo{
bottom:0;
}

.carrito-item{
border-bottom:1px solid #ddd;
padding:8px 0;
}

.eliminar{
color:red;
cursor:pointer;
font-size:13px;
}

</style>
</head>

<body>

<header>
<h2>🛒 MercadoShop</h2>
<div class="carrito-btn" onclick="toggleCarrito()">
🛍 (<span id="contador">0</span>)
</div>
</header>

<div class="buscador">
<input type="search" placeholder="Buscar productos..." id="buscar" onkeyup="buscarProducto()">
</div>

<!-- CARRUSEL -->

<div class="carrusel">
<img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da" class="slide activo">
<img src="https://images.unsplash.com/photo-1607083206968-13611e3d76db" class="slide">
<img src="https://images.unsplash.com/photo-1607083206173-7c5c7d6c2b1e" class="slide">
</div>

<!-- CATEGORIAS -->

<div class="categorias">
<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('electronica')">Electrónica</button>
<button onclick="filtrar('zapatos')">Zapatos</button>
<button onclick="filtrar('herramientas')">Herramientas</button>
</div>

<!-- PRODUCTOS -->

<div class="productos" id="productos"></div>

<!-- MODAL -->

<div id="modal">
<div class="modal-content">

<h3 id="modalNombre"></h3>

<div class="galeria" id="galeria"></div>

<p id="modalDesc"></p>

<p class="precio" id="modalPrecio"></p>

<button class="btn btn-carrito" onclick="agregarCarrito()">Agregar al carrito</button>
<button class="btn btn-whatsapp" onclick="pedirWhatsApp()">Pedir ahora</button>
<button class="btn" onclick="cerrarModal()">Cerrar</button>

</div>
</div>

<!-- CARRITO -->

<div id="carrito">

<h3>Tu carrito</h3>

<div id="lista"></div>

<p><strong>Total: $<span id="total">0</span></strong></p>

<button class="btn btn-whatsapp" onclick="enviarWhatsApp()">Pedir por WhatsApp</button>

</div>

<script src="productos.js"></script>

<script>

let carrito=[];
let total=0;
let productoActual={};

function cargarProductos(){

let cont=document.getElementById("productos");

productos.forEach(p=>{

let card=document.createElement("div");
card.className="producto";
card.dataset.cat=p.categoria;

card.innerHTML=`
<img src="${p.imagenes[0]}">
<h3>${p.nombre}</h3>
<p class="precio">$${p.precio}</p>
`;

card.onclick=()=>verProducto(p);

cont.appendChild(card);

});

}

cargarProductos();

function verProducto(p){

modal.style.display="flex";

modalNombre.innerText=p.nombre;
modalDesc.innerText=p.descripcion;
modalPrecio.innerText="$"+p.precio;

galeria.innerHTML="";

p.imagenes.forEach(img=>{
galeria.innerHTML+=`<img src="${img}">`;
});

productoActual=p;

}

function cerrarModal(){
modal.style.display="none";
}

function agregarCarrito(){

carrito.push(productoActual);

total+=productoActual.precio;

actualizarCarrito();

}

function actualizarCarrito(){

lista.innerHTML="";

carrito.forEach((p,i)=>{

lista.innerHTML+=`
<div class="carrito-item">
${p.nombre} - $${p.precio}
<div class="eliminar" onclick="eliminar(${i})">Eliminar</div>
</div>
`;

});

contador.innerText=carrito.length;
totalSpan.innerText=total;

}

function eliminar(i){

total-=carrito[i].precio;

carrito.splice(i,1);

actualizarCarrito();

}

function toggleCarrito(){
carritoDiv.classList.toggle("activo");
}

function filtrar(cat){

document.querySelectorAll(".producto").forEach(p=>{
p.style.display=(cat=="todos"||p.dataset.cat==cat)?"block":"none";
});

}

function buscarProducto(){

let q=buscar.value.toLowerCase();

document.querySelectorAll(".producto").forEach(p=>{
p.style.display=p.querySelector("h3").innerText.toLowerCase().includes(q)?"block":"none";
});

}

function enviarWhatsApp(){

let texto="Hola quiero pedir:%0A";

carrito.forEach(p=>{
texto+=`- ${p.nombre} $${p.precio}%0A`;
});

texto+=`Total: $${total}`;

window.open("https://wa.me/52TU_NUMERO?text="+texto);

}

function pedirWhatsApp(){

let texto=`Hola quiero pedir ${productoActual.nombre} - $${productoActual.precio}`;

window.open("https://wa.me/52TU_NUMERO?text="+texto);

}

let slides=document.querySelectorAll(".slide");
let index=0;

setInterval(()=>{

slides[index].classList.remove("activo");

index=(index+1)%slides.length;

slides[index].classList.add("activo");

},4000);

const carritoDiv=document.getElementById("carrito");
const lista=document.getElementById("lista");
const contador=document.getElementById("contador");
const totalSpan=document.getElementById("total");

</script>

</body>
</html>
